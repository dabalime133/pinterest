<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CatBoard Pro – Управление коллекциями</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; overflow-x: hidden; }

    /* Layout */
    .app-container { display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      padding: 20px;
      border-right: 1px solid #efefef;
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
      overflow-y: auto;
    }

    /* Masonry Grid */
    .main-content { flex: 1; padding: 20px; }
    .masonry {
      column-count: 4;
      column-gap: 16px;
    }
    @media (max-width: 1200px) { .masonry { column-count: 3; } }
    @media (max-width: 900px)  { .masonry { column-count: 2; } }
    @media (max-width: 600px)  { .masonry { column-count: 1; } }

    .pin-card {
      break-inside: avoid;
      margin-bottom: 16px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: zoom-in;
      transition: transform 0.2s ease;
    }
    .pin-card:hover { transform: scale(1.01); }
    .pin-card img { width: 100%; display: block; }

    .pin-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
    }
    .pin-card:hover .pin-overlay { opacity: 1; }

    /* Header */
    .header {
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      position: sticky;
      top: 0;
      background: white;
      z-index: 100;
      border-bottom: 1px solid #efefef;
    }

    /* UI Elements */
    .btn-save {
      background: #e60023;
      color: white;
      padding: 10px 16px;
      border-radius: 24px;
      font-weight: 700;
      font-size: 14px;
    }
    .btn-save:hover { background: #ad081b; }

    .search-input {
      background: #e9e9e9;
      border-radius: 24px;
      padding: 12px 16px;
      flex: 1;
      border: none;
      outline: none;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      transition: transform 0.3s;
      z-index: 300;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header class="header">
  <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('all')">
    <div class="bg-black text-white w-10 h-10 flex items-center justify-center rounded-full font-bold text-xl">🐾</div>
    <span class="font-bold text-xl tracking-tight hidden lg:block">CatBoard</span>
  </div>
  
  <input type="text" class="search-input" id="searchInput" placeholder="Поиск по породам или настроению..." oninput="filterPins()">

  <div class="flex gap-4 items-center">
    <button class="font-bold p-2 hover:bg-gray-100 rounded-full">🔔</button>
    <button class="font-bold p-2 hover:bg-gray-100 rounded-full">💬</button>
    <div class="w-10 h-10 bg-gray-200 rounded-full overflow-hidden border">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile">
    </div>
  </div>
</header>

<div class="app-container">
  <aside class="sidebar">
    <nav class="flex flex-col gap-2">
      <button onclick="showSection('all')" class="text-left p-3 rounded-lg hover:bg-gray-100 font-semibold flex items-center gap-3">
        🏠 Главная
      </button>
      <button onclick="showSection('saved')" class="text-left p-3 rounded-lg hover:bg-gray-100 font-semibold flex items-center gap-3">
        📌 Все сохраненные
      </button>
      
      <div class="mt-8 mb-2 px-3 text-xs font-bold text-gray-500 uppercase tracking-wider flex justify-between items-center">
        Ваши доски
        <button onclick="openModal()" class="text-lg hover:text-black">+</button>
      </div>
      
      <div id="boardsList" class="flex flex-col gap-1">
        </div>
    </nav>
  </aside>

  <main class="main-content">
    <div class="flex justify-between items-center mb-6">
      <h1 id="pageTitle" class="text-3xl font-extrabold">Для вас</h1>
      <div class="flex gap-2" id="categoryChips">
        </div>
    </div>

    <div class="masonry" id="pinGrid">
      </div>
  </main>
</div>

<div class="modal" id="boardModal" onclick="closeModal()">
  <div class="bg-white p-8 rounded-3xl w-full max-w-md" onclick="event.stopPropagation()">
    <h2 class="text-2xl font-bold mb-6 text-center">Создать доску</h2>
    <input type="text" id="boardNameInput" class="w-full border-2 border-gray-200 rounded-xl p-4 mb-4 outline-none focus:border-black" placeholder="Название (например, 'Рыжие коты')">
    <div class="flex justify-end gap-3">
      <button onclick="closeModal()" class="px-6 py-3 font-bold hover:bg-gray-100 rounded-xl">Отмена</button>
      <button onclick="createBoard()" class="px-6 py-3 bg-black text-white font-bold rounded-xl">Создать</button>
    </div>
  </div>
</div>

<div id="toast">📋 Сохранено!</div>

<script>
// Объединенная база всех фотографий (19 шт)
const allPins = [
  { id: 1, title: 'Милый котенок', cat: 'Милые', img: 'photo_2026-04-21_15-22-03.jpg' },
  { id: 2, title: 'Пушистый соня', cat: 'Спящие', img: 'photo_2026-04-21_15-22-07.jpg' },
  { id: 3, title: 'Глазастый малыш', cat: 'Милые', img: 'photo_2026-04-21_15-22-10.jpg' },
  { id: 4, title: 'Охотник в траве', cat: 'Охота', img: 'photo_2026-04-21_15-22-14.jpg' },
  { id: 5, title: 'Удивленный кот', cat: 'Смешные', img: 'photo_2026-04-21_15-22-18.jpg' },
  { id: 6, title: 'Уютный вечер', cat: 'Спящие', img: 'photo_2026-04-21_15-22-21.jpg' },
  { id: 7, title: 'Рыжий красавец', cat: 'Рыжие', img: 'photo_2026-04-21_15-22-25.jpg' },
  { id: 8, title: 'Кот-ниндзя', cat: 'Охота', img: 'photo_2026-04-21_15-22-32.jpg' },
  { id: 9, title: 'В коробке', cat: 'Смешные', img: 'photo_2026-04-21_15-22-35.jpg' },
  // Новые фото
  { id: 10, title: 'Портрет кота', cat: 'Милые', img: 'photo_2026-02-07_13-21-39.jpg' },
  { id: 11, title: 'Весеннее настроение', cat: 'Активные', img: 'photo_2026-02-10_12-08-15.jpg' },
  { id: 12, title: 'Зимний кот', cat: 'Спящие', img: 'photo_2026-01-17_17-07-26.jpg' },
  { id: 13, title: 'Ночной дозор', cat: 'Охота', img: 'photo_2026-01-21_00-16-57.jpg' },
  { id: 14, title: 'Домашний уют', cat: 'Милые', img: 'photo_2026-01-21_15-59-06.jpg' },
  { id: 15, title: 'Солнечный зайчик', cat: 'Рыжие', img: 'photo_2026-01-22_16-59-05.jpg' },
  { id: 16, title: 'Кот на отдыхе', cat: 'Спящие', img: 'photo_2026-01-22_19-56-19.jpg' },
  { id: 17, title: 'Любопытный нос', cat: 'Смешные', img: 'photo_2026-01-22_20-07-55.jpg' },
  { id: 18, title: 'Игрок', cat: 'Активные', img: 'photo_2026-01-23_01-12-24.jpg' },
  { id: 19, title: 'Взгляд', cat: 'Милые', img: 'photo_2026-01-24_00-19-20.jpg' }
];

let boards = JSON.parse(localStorage.getItem('catBoards')) || [
  { id: 1, name: 'Избранное', pins: [] }
];
let currentSection = 'all'; // all, saved, or board ID
let searchQuery = '';

// Рендер досок в сайдбаре
function renderBoardsList() {
  const list = document.getElementById('boardsList');
  list.innerHTML = boards.map(b => `
    <button onclick="showSection('board', ${b.id})" class="text-left p-3 rounded-lg hover:bg-gray-100 text-sm font-medium flex justify-between items-center group">
      <span>📂 ${b.name}</span>
      <span class="text-xs text-gray-400">${b.pins.length}</span>
    </button>
  `).join('');
}

// Переключение разделов
function showSection(type, id = null) {
  currentSection = type === 'board' ? id : type;
  const title = document.getElementById('pageTitle');
  
  if (type === 'all') title.textContent = 'Для вас';
  else if (type === 'saved') title.textContent = 'Все сохраненные';
  else {
    const board = boards.find(b => b.id === id);
    title.textContent = board ? board.name : 'Доска';
  }
  
  renderGrid();
}

// Сохранение в доску (по умолчанию в первую)
function togglePinSave(pinId, event) {
  event.stopPropagation();
  const targetBoard = boards[0]; // Для упрощения сохраняем в "Избранное"
  
  if (targetBoard.pins.includes(pinId)) {
    targetBoard.pins = targetBoard.pins.filter(id => id !== pinId);
    showToast('Удалено из коллекции');
  } else {
    targetBoard.pins.push(pinId);
    showToast('Сохранено в Избранное! 🐾');
  }
  
  localStorage.setItem('catBoards', JSON.stringify(boards));
  renderBoardsList();
  renderGrid();
}

// Рендер сетки
function renderGrid() {
  const grid = document.getElementById('pinGrid');
  let filtered = [];

  if (currentSection === 'all') {
    filtered = allPins;
  } else if (currentSection === 'saved') {
    const allSavedIds = [...new Set(boards.flatMap(b => b.pins))];
    filtered = allPins.filter(p => allSavedIds.includes(p.id));
  } else {
    const board = boards.find(b => b.id === currentSection);
    filtered = board ? allPins.filter(p => board.pins.includes(p.id)) : [];
  }

  if (searchQuery) {
    filtered = filtered.filter(p => p.title.toLowerCase().includes(searchQuery) || p.cat.toLowerCase().includes(searchQuery));
  }

  grid.innerHTML = filtered.map(pin => {
    const isSaved = boards.some(b => b.pins.includes(pin.id));
    return `
      <div class="pin-card">
        <img src="${pin.img}" alt="${pin.title}">
        <div class="pin-overlay">
          <div class="flex justify-end">
            <button onclick="togglePinSave(${pin.id}, event)" class="btn-save">
              ${isSaved ? 'Сохранено' : 'Сохранить'}
            </button>
          </div>
          <div class="text-white font-bold text-shadow">${pin.title}</div>
        </div>
      </div>
    `;
  }).join('');
}

// Модальное окно
function openModal() { document.getElementById('boardModal').classList.add('active'); }
function closeModal() { document.getElementById('boardModal').classList.remove('active'); }

function createBoard() {
  const name = document.getElementById('boardNameInput').value.trim();
  if (!name) return;
  
  boards.push({ id: Date.now(), name: name, pins: [] });
  localStorage.setItem('catBoards', JSON.stringify(boards));
  document.getElementById('boardNameInput').value = '';
  closeModal();
  renderBoardsList();
  showToast(`Доска "${name}" создана!`);
}

function filterPins() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderGrid();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Инициализация
renderBoardsList();
renderGrid();
</script>

</body>
</html>
